<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>For Oishe ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
min-height:100vh;
overflow:hidden;
background:linear-gradient(-45deg,#ff4d6d,#ff758f,#ff8fa3,#ffc2d1);
background-size:400% 400%;
animation:bg 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{
width:min(90%,800px);
padding:40px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
border-radius:24px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2)
}
h1{font-size:3rem}
h2{margin:10px 0 25px;color:#fff3f6}
p{font-size:1.15rem;line-height:1.8}
button{
margin-top:30px;
padding:14px 28px;
border:none;
border-radius:30px;
background:#fff;
color:#e91e63;
font-size:1rem;
cursor:pointer;
font-weight:bold;
}
button:hover{transform:scale(1.05)}
.heart{
position:fixed;
font-size:22px;
animation:float linear forwards;
pointer-events:none;
}
@keyframes float{
from{transform:translateY(100vh);opacity:1}
to{transform:translateY(-120px);opacity:0}
}
footer{margin-top:25px;font-size:.95rem;opacity:.9}
</style>
</head>
<body>

<div class="card">
<h1>💖 Dear Oishe 💖</h1>
<h2>From Sifat</h2>

<p id="typing"></p>

<button onclick="surprise()">Open My Heart ❤️</button>

<footer>
Forever isn't long enough with you. 🌹
</footer>
</div>

<script>
const text=`Oishe,

Every moment with you feels like a beautiful dream.
Your smile brightens my darkest days, your laughter is my favorite melody,
and your love is the greatest gift I've ever received.

Thank you for being my happiness, my peace, and my favorite person.
No matter where life takes us, my heart will always choose you.

I love you today, tomorrow, forever, and beyond.

❤️ Yours,
Sifat`;

let i=0;
function type(){
 if(i<text.length){
   document.getElementById("typing").innerHTML+=text.charAt(i);
   i++;
   setTimeout(type,35);
 }
}
type();

function surprise(){
alert("🌹 Oishe, you are the most beautiful chapter of my life. I love you endlessly. ❤️\n\n— Sifat");
}

function heart(){
 const h=document.createElement("div");
 h.className="heart";
 h.innerHTML="💖";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(4+Math.random()*4)+"s";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),8000);
}
setInterval(heart,250);
</script>

</body>
</html>
